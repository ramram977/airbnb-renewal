<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <link rel="manifest" href="/airbnb-renewal/manifest.json">
  <meta name="theme-color" content="#E8A020">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="스테이">
  <link rel="apple-touch-icon" href="/airbnb-renewal/icons/icon-192.png">
  <title>지도 — Airbnb</title>
  <script src="common.js"></script>
  <script type="text/javascript"
    src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=08be264251f2f529df69c1e921140378&libraries=services&autoload=false">
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --red: #FF385C;
      --dark: #222222;
      --mid: #717171;
      --light: #EBEBEB;
      --white: #FFFFFF;
    }

    body {
      font-family: -apple-system, 'Pretendard', 'SF Pro Display', sans-serif;
      background: #000;
      overflow: hidden;
    }

    /* ── APP SHELL ── */
    .app {
      position: relative;
      width: 390px;
      height: 100dvh;
      margin: 0 auto;
      overflow: hidden;
    }

    /* ── FULL-SCREEN MAP ── */
    #kakao-map {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    /* ── SEARCH BAR ── */
    .map-search {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 16px);
      left: 16px;
      right: 16px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--white);
      border-radius: 50px;
      padding: 10px 10px 10px 16px;
      box-shadow: 0 2px 20px rgba(0,0,0,.18);
    }
    .map-search-icon { font-size: 16px; color: #AEAEAE; flex-shrink: 0; }
    .map-search input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 14px;
      color: var(--dark);
      background: transparent;
    }
    .map-search input::placeholder { color: #AEAEAE; }
    .map-search-btn {
      background: var(--red);
      color: var(--white);
      border: none;
      border-radius: 50%;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
      flex-shrink: 0;
      transition: transform .15s;
    }
    .map-search-btn:active { transform: scale(.9); }

    /* ── FLOAT BUTTONS (top-left) ── */
    .float-btns {
      position: absolute;
      top: 126px;
      left: 16px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .float-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: var(--white);
      border: none;
      box-shadow: 0 2px 14px rgba(0,0,0,.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 19px;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
    }
    .float-btn:active { transform: scale(.9); box-shadow: 0 1px 6px rgba(0,0,0,.12); }

    /* ── CUSTOM MAP MARKER ── */
    .map-pin {
      background: var(--white);
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 12.5px;
      font-weight: 700;
      color: var(--dark);
      box-shadow: 0 2px 10px rgba(0,0,0,.22);
      border: 1.5px solid rgba(0,0,0,.06);
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
      transition: all .2s cubic-bezier(.34,1.56,.64,1);
      position: relative;
    }
    .map-pin::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: var(--white);
      filter: drop-shadow(0 2px 2px rgba(0,0,0,.1));
    }
    .map-pin.active {
      background: var(--dark);
      color: var(--white);
      transform: scale(1.12);
      box-shadow: 0 4px 18px rgba(0,0,0,.35);
    }
    .map-pin.active::after { border-top-color: var(--dark); }

    /* ── ACCOMMODATION CAROUSEL ── */
    .acc-wrap {
      position: absolute;
      bottom: 90px;
      left: 0;
      right: 0;
      z-index: 150;
      opacity: 0;
      transform: translateY(20px);
      pointer-events: none;
      transition: opacity .28s ease, transform .28s ease;
    }
    .acc-wrap.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .acc-carousel {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      /* Center first/last card: padding = (390 - 310) / 2 = 40px */
      padding: 6px 40px;
      scroll-padding: 0 40px;
    }
    .acc-carousel::-webkit-scrollbar { display: none; }

    .acc-card {
      flex: 0 0 310px;
      height: 115px;
      background: var(--white);
      border-radius: 20px;
      scroll-snap-align: center;
      display: flex;
      gap: 13px;
      padding: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.14);
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: border-color .2s, box-shadow .2s;
    }
    .acc-card.active {
      border-color: var(--red);
      box-shadow: 0 6px 28px rgba(255,56,92,.2);
    }
    .acc-card.active::after {
      content: '상세 보기 →';
      position: absolute;
      bottom: 10px; right: 10px;
      background: var(--red);
      color: #fff;
      font-size: 10.5px; font-weight: 700;
      padding: 3px 8px; border-radius: 8px;
      pointer-events: none;
    }
    .acc-card { position: relative; }

    .acc-thumb {
      width: 91px;
      height: 91px;
      border-radius: 13px;
      object-fit: cover;
      flex-shrink: 0;
    }
    .acc-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      min-width: 0;
    }
    .acc-name {
      font-size: 13.5px;
      font-weight: 700;
      color: var(--dark);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .acc-desc {
      font-size: 11px;
      color: var(--mid);
      margin-top: 2px;
    }
    .acc-stars {
      font-size: 11.5px;
      color: var(--dark);
      margin-top: 3px;
    }
    .acc-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .acc-price {
      font-size: 14px;
      font-weight: 700;
      color: var(--dark);
    }
    .acc-price span { font-size: 11px; font-weight: 400; color: var(--mid); }
    .acc-heart {
      font-size: 19px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 2px;
      line-height: 1;
    }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(0,0,0,.08);
      display: flex;
      align-items: flex-start;
      justify-content: space-around;
      padding: 10px 0 28px;
      z-index: 200;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      flex: 1;
    }
    .nav-icon { font-size: 22px; color: var(--mid); }
    .nav-label { font-size: 10.5px; color: var(--mid); font-weight: 500; }

    /* Map nav — emphasized pill */
    .nav-item.map-active .nav-icon-pill {
      background: var(--red);
      border-radius: 50px;
      padding: 11px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      margin-top: -26px;
      box-shadow: 0 4px 16px rgba(255,56,92,.42);
    }
    .nav-item.map-active .nav-icon-pill .nav-icon { color: var(--white); font-size: 17px; }
    .nav-item.map-active .nav-icon-pill .pill-label { color: var(--white); font-size: 11px; font-weight: 700; }
    .nav-item.map-active > .nav-label { display: none; }

    /* Filter modal backdrop */
    .filter-modal {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 300;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }
    .filter-modal.open { opacity: 1; pointer-events: auto; }
    .filter-sheet {
      background: var(--white);
      width: 100%;
      border-radius: 24px 24px 0 0;
      padding: 20px 24px 48px;
    }
    .filter-handle {
      width: 40px;
      height: 4px;
      background: var(--light);
      border-radius: 2px;
      margin: 0 auto 20px;
    }
    .filter-title { font-size: 17px; font-weight: 700; margin-bottom: 18px; }
    .filter-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
    .filter-chip {
      padding: 7px 16px;
      border-radius: 30px;
      border: 1.5px solid var(--light);
      font-size: 13px;
      cursor: pointer;
      transition: all .15s;
    }
    .filter-chip.on { background: var(--dark); color: var(--white); border-color: var(--dark); }
    .filter-apply {
      width: 100%;
      padding: 14px;
      background: var(--red);
      color: var(--white);
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      margin-top: 8px;
      cursor: pointer;
    }

    /* ════════════════════════════════════
       DARK MODE
    ════════════════════════════════════ */
    html[data-theme="dark"] {
      --dark:  #E5E5E7;
      --mid:   #8E8E93;
      --light: #38383A;
    }
    [data-theme="dark"] .map-search {
      background: #1C1C1E;
      box-shadow: 0 2px 20px rgba(0,0,0,.6);
    }
    [data-theme="dark"] .map-search input { color: #E5E5E7; }
    [data-theme="dark"] .map-search input::placeholder { color: #48484A; }
    [data-theme="dark"] .map-search-icon { color: #8E8E93; }
    [data-theme="dark"] .float-btn {
      background: #1C1C1E;
      box-shadow: 0 2px 14px rgba(0,0,0,.5);
    }
    [data-theme="dark"] .map-pin {
      background: #1C1C1E;
      color: #E5E5E7;
      border-color: rgba(255,255,255,.1);
    }
    [data-theme="dark"] .map-pin::after { border-top-color: #1C1C1E; }
    [data-theme="dark"] .map-pin.active {
      background: #E5E5E7;
      color: #141414;
    }
    [data-theme="dark"] .map-pin.active::after { border-top-color: #E5E5E7; }
    [data-theme="dark"] .acc-card {
      background: #1C1C1E;
      box-shadow: 0 4px 24px rgba(0,0,0,.5);
    }
    [data-theme="dark"] .bottom-nav {
      background: rgba(20,20,20,0.97);
      border-top-color: #38383A;
    }
    [data-theme="dark"] .filter-sheet { background: #1C1C1E; }
    [data-theme="dark"] .filter-handle { background: #38383A; }
    [data-theme="dark"] .filter-chip { border-color: #38383A; color: #E5E5E7; }
    [data-theme="dark"] .filter-chip.on { background: #E5E5E7; color: #141414; border-color: #E5E5E7; }

  </style>
</head>
<body>
<div class="app">

  <!-- Map -->
  <div id="kakao-map"></div>

  <!-- Search bar -->
  <div class="map-search">
    <span class="map-search-icon">🔍</span>
    <input type="search" id="searchInput" placeholder="도시, 지역, 숙소 이름 검색"
           enterkeyhint="search" autocomplete="off" />
    <button class="map-search-btn" onclick="doSearch()">↵</button>
  </div>

  <!-- Float buttons -->
  <div class="float-btns">
    <button class="float-btn" title="필터" onclick="openFilter()">⚙️</button>
    <button class="float-btn" title="현위치" onclick="goToMyLocation()">📍</button>
  </div>

  <!-- Accommodation carousel -->
  <div class="acc-wrap" id="accWrap">
    <div class="acc-carousel" id="accCarousel"></div>
  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <div class="nav-item" onclick="location.href='index.html'">
      <span class="nav-icon">🔍</span>
      <span class="nav-label">검색</span>
    </div>
    <div class="nav-item" onclick="location.href='trip.html'">
      <span class="nav-icon">✈️</span>
      <span class="nav-label">여행</span>
    </div>
    <div class="nav-item map-active">
      <div class="nav-icon-pill">
        <span class="nav-icon">🗺️</span>
        <span class="pill-label">지도</span>
      </div>
      <span class="nav-label">지도</span>
    </div>
    <div class="nav-item" onclick="location.href='messages.html'" style="cursor:pointer">
      <span class="nav-icon">💬</span>
      <span class="nav-label">메시지</span>
    </div>
    <div class="nav-item" onclick="location.href='profile.html'" style="cursor:pointer">
      <span class="nav-icon">👤</span>
      <span class="nav-label">프로필</span>
    </div>
  </nav>

  <!-- Filter modal -->
  <div class="filter-modal" id="filterModal" onclick="closeFilter(event)">
    <div class="filter-sheet">
      <div class="filter-handle"></div>
      <div class="filter-title">필터</div>
      <div style="font-size:13px;color:var(--mid);margin-bottom:10px;">가격대</div>
      <div class="filter-row">
        <div class="filter-chip" onclick="this.classList.toggle('on')">~ ₩10만</div>
        <div class="filter-chip on" onclick="this.classList.toggle('on')">₩10 ~ 20만</div>
        <div class="filter-chip" onclick="this.classList.toggle('on')">₩20 ~ 35만</div>
        <div class="filter-chip" onclick="this.classList.toggle('on')">₩35만 ~</div>
      </div>
      <div style="font-size:13px;color:var(--mid);margin:14px 0 10px;">숙소 유형</div>
      <div class="filter-row">
        <div class="filter-chip on" onclick="this.classList.toggle('on')">전체</div>
        <div class="filter-chip" onclick="this.classList.toggle('on')">독채</div>
        <div class="filter-chip" onclick="this.classList.toggle('on')">개인실</div>
        <div class="filter-chip" onclick="this.classList.toggle('on')">한옥</div>
        <div class="filter-chip" onclick="this.classList.toggle('on')">풀빌라</div>
      </div>
      <button class="filter-apply" onclick="closeFilter()">적용하기</button>
    </div>
  </div>

</div><!-- .app -->

<script>
/* ── DATA ─────────────────────────────────────────── */
const IMGS = [
  'rooms/Where To Stay In Switzerland.jpg',
  'rooms/room2.jpg',
  'rooms/\ub2e4\uc6b4\ub85c\ub4dc.jpg',
  'rooms/\ub2e4\uc6b4\ub85c\ub4dc (1).jpg',
  'rooms/\ub2e4\uc6b4\ub85c\ub4dc (2).jpg',
  'rooms/\ub2e4\uc6b4\ub85c\ub4dc (3).jpg',
  'rooms/\ub2e4\uc6b4\ub85c\ub4dc (4).jpg',
];

const STAYS = [
  { name: '스위스 마운틴 샬레',    price: 285000, rating: 4.98, reviews: 237, img: 0, desc: '알프스 뷰 · 통나무집 · 2베드룸',    liked: true,  detailId: 3 },
  { name: '미니멀 모던 스튜디오',  price: 142000, rating: 4.92, reviews: 184, img: 1, desc: '도심 뷰 · 모던 인테리어 · 1베드룸', liked: false, detailId: 5 },
  { name: '제주 힐링 스테이',      price: 198000, rating: 4.87, reviews:  96, img: 2, desc: '바다 뷰 · 테라스 · 독채',           liked: false, detailId: 4 },
  { name: '숲속 로그 하우스',      price: 320000, rating: 5.00, reviews:  52, img: 3, desc: '자연 속 · 바베큐 · 3베드룸',        liked: true,  detailId: 3 },
  { name: '감성 아파트 — 성수',    price: 112000, rating: 4.85, reviews: 203, img: 4, desc: '성수동 · 감성 인테리어 · 2인',      liked: false, detailId: 5 },
  { name: '전통 한옥 스테이',      price: 165000, rating: 4.93, reviews: 118, img: 5, desc: '전주 한옥마을 · 전통 경험 · 4인',   liked: true,  detailId: 1 },
  { name: '오션뷰 풀빌라',         price: 245000, rating: 4.76, reviews:  89, img: 6, desc: '해운대 · 수영장 · 3베드룸',         liked: false, detailId: 2 },
  { name: '북촌 게스트하우스',     price:  89000, rating: 4.82, reviews: 156, img: 2, desc: '경복궁 인근 · 한옥 · 2인',          liked: false, detailId: 1 },
  { name: '강남 럭셔리 스위트',    price: 380000, rating: 4.95, reviews:  74, img: 3, desc: '강남구 · 고층 뷰 · 2베드룸',        liked: false, detailId: 6 },
  { name: '홍대 아티스트 스튜디오',price:  98000, rating: 4.79, reviews: 221, img: 4, desc: '홍대 · 아트 감성 · 1인',            liked: false, detailId: 5 },
  { name: '여의도 리버뷰',         price: 215000, rating: 4.88, reviews:  63, img: 5, desc: '한강 뷰 · 넓은 거실 · 2인',         liked: false, detailId: 6 },
  { name: '이태원 글로벌 하우스',  price: 135000, rating: 4.71, reviews: 145, img: 6, desc: '이태원 · 다문화 · 3인',             liked: false, detailId: 5 },
  { name: '망원동 감성 룸',        price:  75000, rating: 4.84, reviews: 198, img: 0, desc: '망원동 · 조용한 주택가 · 1인',      liked: false, detailId: 5 },
  { name: '종로 한옥 별채',        price: 185000, rating: 4.91, reviews:  87, img: 1, desc: '종로구 · 별채 · 전용 마당',         liked: false, detailId: 1 },
  { name: '잠실 스카이 레지던스',  price: 295000, rating: 4.89, reviews: 112, img: 2, desc: '잠실 · 롯데타워 뷰 · 2베드룸',      liked: false, detailId: 2 },
];

/* Default 15 coords (Seoul) */
const SEOUL_COORDS = [
  {lat:37.5665, lng:126.9780}, {lat:37.5796, lng:126.9770},
  {lat:37.5512, lng:126.9882}, {lat:37.5448, lng:127.0557},
  {lat:37.5172, lng:127.0473}, {lat:37.5662, lng:126.9021},
  {lat:37.5145, lng:127.1050}, {lat:37.5704, lng:127.0088},
  {lat:37.5340, lng:126.9943}, {lat:37.5160, lng:127.0276},
  {lat:37.5596, lng:126.9423}, {lat:37.5819, lng:127.0009},
  {lat:37.5491, lng:126.9196}, {lat:37.4979, lng:127.0276},
  {lat:37.5622, lng:127.0369},
];

/* ── MAP INIT ─────────────────────────────────────── */
let map;
let pinOverlays = [];
let pinEls = [];
let pinCoords = [];
let boundPolygons = [];
let activeIdx = -1;

kakao.maps.load(function() {
  map = new kakao.maps.Map(document.getElementById('kakao-map'), {
    center: new kakao.maps.LatLng(37.5665, 126.9780),
    level: 8,
  });
  placeMarkers(SEOUL_COORDS);
  buildCarousel();

  const urlQ = new URLSearchParams(location.search).get('q');
  if (urlQ) {
    document.getElementById('searchInput').value = urlQ;
    doSearch();
  }
});

/* ── MARKERS ──────────────────────────────────────── */
function placeMarkers(coords) {
  pinOverlays.forEach(o => o.setMap(null));
  pinOverlays = []; pinEls = []; pinCoords = [...coords];

  coords.forEach((c, i) => {
    const el = document.createElement('div');
    el.className = 'map-pin';
    el.textContent = `₩${Math.round(STAYS[i].price / 10000)}만`;
    el.addEventListener('click', () => selectCard(i, true));

    const ov = new kakao.maps.CustomOverlay({
      position: new kakao.maps.LatLng(c.lat, c.lng),
      content: el,
      yAnchor: 1.55,
      zIndex: 3,
    });
    ov.setMap(map);
    pinOverlays.push(ov);
    pinEls.push(el);
  });
}

function setActivePin(idx) {
  pinEls.forEach((el, i) => el.classList.toggle('active', i === idx));
}

/* ── CAROUSEL ─────────────────────────────────────── */
const CARD_W = 310;
const CARD_GAP = 12;
const CARD_STRIDE = CARD_W + CARD_GAP;

function buildCarousel() {
  const rail = document.getElementById('accCarousel');
  rail.innerHTML = '';

  STAYS.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'acc-card';
    card.innerHTML = `
      <img class="acc-thumb" src="${IMGS[s.img]}" alt="${s.name}" loading="lazy" />
      <div class="acc-body">
        <div>
          <div class="acc-name">${s.name}</div>
          <div class="acc-desc">${s.desc}</div>
          <div class="acc-stars">⭐ ${s.rating} · 후기 ${s.reviews}개</div>
        </div>
        <div class="acc-foot">
          <div class="acc-price">₩${s.price.toLocaleString()} <span>/ 박</span></div>
          <button class="acc-heart" data-i="${i}">${s.liked ? '❤️' : '🤍'}</button>
        </div>
      </div>`;
    // 탭: 이미 활성 카드면 detail 페이지로, 아니면 활성화
    let tapStart = 0;
    card.addEventListener('pointerdown', () => { tapStart = Date.now(); });
    card.addEventListener('click', e => {
      if (e.target.closest('.acc-heart')) return; // 하트 버튼 제외
      const isTap = (Date.now() - tapStart) < 300;
      if (activeIdx === i && isTap) {
        location.href = `detail.html?id=${STAYS[i].detailId}`;
      } else {
        selectCard(i, true);
      }
    });
    rail.appendChild(card);
  });

  rail.addEventListener('click', e => {
    const btn = e.target.closest('.acc-heart');
    if (!btn) return;
    e.stopPropagation();
    const i = +btn.dataset.i;
    STAYS[i].liked = !STAYS[i].liked;
    btn.textContent = STAYS[i].liked ? '❤️' : '🤍';
  });

  let scrollTimer;
  rail.addEventListener('scroll', () => {
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(() => {
      const idx = Math.round(rail.scrollLeft / CARD_STRIDE);
      if (idx !== activeIdx && idx >= 0 && idx < STAYS.length) {
        activeIdx = idx;
        setActivePin(idx);
        updateCardActive(idx);
        if (pinCoords[idx])
          map.panTo(new kakao.maps.LatLng(pinCoords[idx].lat, pinCoords[idx].lng));
      }
    }, 80);
  });
}

function selectCard(idx, panMap = false) {
  document.getElementById('accWrap').classList.add('visible');
  activeIdx = idx;
  setActivePin(idx);
  updateCardActive(idx);
  document.getElementById('accCarousel').scrollTo({ left: idx * CARD_STRIDE, behavior: 'smooth' });
  if (panMap && pinCoords[idx])
    map.panTo(new kakao.maps.LatLng(pinCoords[idx].lat, pinCoords[idx].lng));
}

function updateCardActive(idx) {
  document.querySelectorAll('.acc-card').forEach((c, i) =>
    c.classList.toggle('active', i === idx));
}

/* ── BOUNDARY HELPERS ─────────────────────────────── */
function clearBoundary() {
  boundPolygons.forEach(p => p.setMap(null));
  boundPolygons = [];
}

function drawGeoJsonBoundary(geojson) {
  clearBoundary();
  const style = {
    strokeWeight: 2.5, strokeColor: '#FF385C',
    strokeOpacity: 0.85, strokeStyle: 'solid',
    fillColor: '#FF385C', fillOpacity: 0.05,
  };
  const rings = geojson.type === 'Polygon'
    ? [geojson.coordinates[0]]
    : geojson.coordinates.map(poly => poly[0]);
  rings.forEach(ring => {
    const path = ring.map(([lng, lat]) => new kakao.maps.LatLng(lat, lng));
    boundPolygons.push(new kakao.maps.Polygon({ path, map, ...style }));
  });
}

/* ── SEARCH ───────────────────────────────────────── */
function doSearch() {
  const kw = document.getElementById('searchInput').value.trim();
  if (!kw) return;

  // Kakao Places로 검색 위치·줌 결정
  const ps = new kakao.maps.services.Places();
  ps.keywordSearch(kw, async (data, status) => {
    if (status !== kakao.maps.services.Status.OK) {
      alert('검색 결과가 없습니다.');
      return;
    }

    const bounds = new kakao.maps.LatLngBounds();
    data.forEach(p => bounds.extend(new kakao.maps.LatLng(+p.y, +p.x)));
    map.setBounds(bounds);

    const sw = bounds.getSouthWest();
    const ne = bounds.getNorthEast();
    placeMarkers(Array.from({ length: 15 }, () => ({
      lat: sw.getLat() + Math.random() * (ne.getLat() - sw.getLat()),
      lng: sw.getLng() + Math.random() * (ne.getLng() - sw.getLng()),
    })));

    document.getElementById('accWrap').classList.remove('visible');
    activeIdx = -1;

    // Nominatim으로 정확한 행정구역 경계 폴리곤 추가
    try {
      const res = await fetch(
        `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(kw)}&format=json&limit=10&countrycodes=kr&polygon_geojson=1`,
        { headers: { 'Accept-Language': 'ko' } }
      );
      const nominatimData = await res.json();
      const place = nominatimData.find(d => d.class === 'boundary' && d.type === 'administrative');
      if (place?.geojson) drawGeoJsonBoundary(place.geojson);
      else clearBoundary();
    } catch {
      clearBoundary();
    }
  });
}

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

/* ── LOCATION ─────────────────────────────────────── */
function goToMyLocation() {
  if (!navigator.geolocation) { alert('위치 서비스를 지원하지 않는 브라우저입니다.'); return; }
  navigator.geolocation.getCurrentPosition(pos => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    map.setCenter(new kakao.maps.LatLng(lat, lng));
    map.setLevel(5);

    /* 현위치 중심으로 반경 ~1.5km 내 15개 마커 */
    const spread = 0.013;
    const nearbyCoords = Array.from({ length: 15 }, () => ({
      lat: lat + (Math.random() - 0.5) * spread,
      lng: lng + (Math.random() - 0.5) * spread,
    }));

    clearBoundary();
    placeMarkers(nearbyCoords);

    document.getElementById('accWrap').classList.remove('visible');
    activeIdx = -1;
  }, () => alert('위치 정보를 가져올 수 없습니다.'));
}

/* ── FILTER ───────────────────────────────────────── */
function openFilter() { document.getElementById('filterModal').classList.add('open'); }
function closeFilter(e) {
  if (!e || e.target === document.getElementById('filterModal'))
    document.getElementById('filterModal').classList.remove('open');
}
</script>
